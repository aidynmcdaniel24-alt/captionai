<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <title>You are offline · CaptionAI</title>
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: dark light;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #09090b;
        color: #fafafa;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        min-height: 100vh;
        background-image:
          radial-gradient(circle at 20% 10%, rgba(124, 58, 237, 0.35), transparent 40%),
          radial-gradient(circle at 80% 90%, rgba(217, 70, 239, 0.25), transparent 40%);
      }
      .card {
        max-width: 420px;
        text-align: center;
        background: rgba(24, 24, 27, 0.85);
        border: 1px solid rgba(63, 63, 70, 0.6);
        border-radius: 24px;
        padding: 32px 24px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        border-radius: 18px;
        background: linear-gradient(135deg, #7c3aed, #d946ef);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: -0.02em;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        font-weight: 700;
      }
      p {
        margin: 0 0 18px;
        font-size: 15px;
        line-height: 1.6;
        color: #d4d4d8;
      }
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #7c3aed;
        color: white;
        border: 0;
        border-radius: 9999px;
        padding: 12px 22px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover { background: #8b5cf6; }
      .hint {
        margin-top: 18px;
        font-size: 12px;
        color: #a1a1aa;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="logo" aria-hidden="true">C</div>
      <h1>You are offline</h1>
      <p>
        CaptionAI needs an internet connection to generate captions. Reconnect and
        we'll get right back to it.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
      <p class="hint">Tip: your saved captions sync automatically once you're back online.</p>
    </main>
  </body>
</html>
